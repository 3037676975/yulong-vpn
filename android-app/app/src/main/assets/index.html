<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>玉龙VPN</title>
<style>
:root{--bg:#0a111b;--panel:#111a25;--panel2:#0d141e;--line:#2c3b4d;--gold:#edc86b;--gold2:#e2a735;--text:#f7f4ec;--muted:#aab5c3;--green:#20f09a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;min-height:100dvh;background:linear-gradient(180deg,#17212c 0,#0c131d 42%,#060b12 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;overflow-x:hidden}.app{width:100%;max-width:330px;margin:0 auto;min-height:100dvh;padding:10px 19px 18px}.top{height:55px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px}.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 18%,#fff3b4 0,#d7a63c 22%,#382509 52%,#050608 72%);border:1px solid rgba(236,196,92,.38);box-shadow:0 0 15px rgba(223,164,48,.42),inset 0 0 16px rgba(0,0,0,.9);font-size:29px;line-height:1;filter:saturate(1.15)}.logo span{display:block;transform:rotate(-12deg);filter:drop-shadow(0 0 4px #e9bd54)}.title h1{margin:0;font-size:24px;line-height:1;font-weight:900;letter-spacing:.2px}.title p{margin:6px 0 0;color:#b9c1cc;font-size:12px;letter-spacing:3px}.tools{display:flex;gap:10px}.roundBtn{width:35px;height:35px;border-radius:50%;border:1px solid #334356;background:rgba(12,18,28,.75);color:#fff;display:grid;place-items:center;font-size:17px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}.notice{height:52px;margin-top:12px;border:1px solid #2c3d52;border-radius:12px;background:linear-gradient(180deg,rgba(24,34,46,.95),rgba(16,25,36,.95));display:flex;align-items:center;gap:13px;padding:0 15px}.bell{font-size:23px;color:#ffd774;filter:drop-shadow(0 0 7px rgba(255,209,98,.45))}.notice p{margin:0;color:#e1e8ef;font-size:12px;line-height:1.5;font-weight:700}.verify{height:92px;margin-top:12px;border:1px solid rgba(236,200,107,.55);border-radius:13px;background:rgba(28,24,16,.55);padding:12px 11px}.verify h3{margin:0 0 4px;color:#ffdc77;font-size:13px;font-weight:900}.verify p{margin:0 0 8px;color:#aeb3b9;font-size:10px;white-space:nowrap}.verifyRow{display:flex;gap:8px}.verify input{width:118px;height:30px;border:1px solid #5e563d;border-radius:8px;background:rgba(255,255,255,.08);color:#eee;text-align:center;letter-spacing:8px;padding-left:8px;outline:0}.verify button{flex:1;height:30px;border:0;border-radius:8px;background:linear-gradient(180deg,#f6c85f,#dfaa34);color:#17120a;font-size:11px;font-weight:900}.card{height:168px;margin-top:12px;border:1px solid #38506a;border-radius:18px;background:radial-gradient(circle at 74% 46%,rgba(100,74,12,.55),rgba(16,25,37,.97) 42%,rgba(13,21,32,.98));padding:16px 16px 13px;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.26)}.card:before{content:"";position:absolute;right:14px;top:38px;width:138px;height:82px;opacity:.34;background-image:radial-gradient(circle,rgba(238,198,93,.9) 1px,transparent 1.5px);background-size:5px 5px;clip-path:polygon(0 36%,16% 24%,31% 33%,48% 18%,68% 23%,90% 13%,100% 34%,84% 52%,92% 77%,70% 66%,48% 82%,26% 64%,8% 73%)}.state{position:relative;z-index:2;display:flex;align-items:center;gap:8px;color:#28f59a;font-size:13px;font-weight:800}.dot{width:7px;height:7px;border-radius:50%;background:#20f09a;box-shadow:0 0 11px #20f09a}.nodeName{position:relative;z-index:2;margin:19px 0 8px;font-size:31px;line-height:1;font-weight:900;letter-spacing:1px}.safe{position:relative;z-index:2;display:flex;align-items:center;gap:8px;color:#aeb8c5;font-size:13px}.safeIcon{width:17px;height:17px;border-radius:4px;border:1px solid #596779;display:grid;place-items:center;font-size:10px;color:#7d8998}.globe{position:absolute;right:18px;top:41px;width:102px;height:92px;display:grid;place-items:center}.globe:before{content:"";position:absolute;width:83px;height:83px;border-radius:50%;border:1px dashed rgba(237,200,107,.75);box-shadow:0 0 0 6px rgba(237,200,107,.05),0 0 20px rgba(237,200,107,.3);background:repeating-radial-gradient(circle,transparent 0 8px,rgba(237,200,107,.22) 9px,transparent 10px)}.shield{position:relative;z-index:2;width:53px;height:63px;background:linear-gradient(180deg,#b67f22,#6c470e);clip-path:polygon(50% 0,92% 15%,85% 67%,50% 100%,15% 67%,8% 15%);display:grid;place-items:center;color:white;font-size:31px;filter:drop-shadow(0 0 12px rgba(237,200,107,.55))}.cardLine{position:absolute;left:16px;right:16px;bottom:43px;height:1px;background:rgba(169,187,210,.17)}.tags{position:absolute;left:16px;right:16px;bottom:12px;display:flex;align-items:center;gap:7px}.tag{height:27px;border:1px solid rgba(237,200,107,.42);border-radius:12px;padding:0 8px;color:#ffdc6f;display:flex;align-items:center;font-size:11px;font-weight:900}.lat{margin-left:auto;color:#c1c8d0;font-size:12px;font-weight:700}.ms{color:#22f19b;font-size:21px;font-weight:900;margin-left:4px}.primary{width:100%;height:45px;margin-top:12px;border:0;border-radius:12px;background:linear-gradient(180deg,#ffe99d,#e0aa35);color:#111;display:flex;align-items:center;justify-content:center;gap:10px;font-size:20px;font-weight:900;box-shadow:0 8px 22px rgba(224,170,53,.26)}.primary span:first-child{font-size:23px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.smallBtn{height:48px;border:1px solid #2b3a4d;border-radius:12px;background:linear-gradient(180deg,#141d28,#0c131d);color:#fff;font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.smallBtn b{font-size:20px;line-height:13px;font-weight:500}.mode{height:58px;margin-top:12px;border:1px solid #2b3a4d;border-radius:13px;background:#0d141d;display:flex;align-items:center;gap:12px;padding:0 14px}.modeIcon{width:33px;height:33px;border-radius:50%;border:1px solid rgba(237,200,107,.45);display:grid;place-items:center;color:#ffcf63}.modeText{flex:1}.modeText b{display:block;font-size:15px}.modeText small{display:block;color:#9aa5b2;margin-top:4px;font-size:11px}.switch{width:45px;height:26px;border-radius:99px;background:linear-gradient(90deg,#ddb14d,#f7d56e);position:relative}.switch:after{content:"";position:absolute;right:3px;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}.toast{height:18px;margin-top:7px;text-align:center;color:#d8c48e;font-size:11px}.list{display:none;position:fixed;inset:0;background:#090f18;padding:16px 18px;z-index:5}.list.active{display:block}.listHead{display:flex;align-items:center;margin-bottom:12px}.back{width:38px;height:38px;border:0;background:transparent;color:#fff;font-size:30px}.listHead h2{flex:1;text-align:center;font-size:18px;margin:0}.nodes{max-height:calc(100dvh - 70px);overflow:auto}.nodeItem{height:54px;border:1px solid #2b3a4d;border-radius:12px;background:#111a25;margin-bottom:9px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between}.nodeItem b{font-size:14px}.nodeItem small{display:block;margin-top:3px;color:#95a2b1;font-size:10px}.ok{color:#20f09a;font-weight:900}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand"><div class="logo"><span>🐉</span></div><div class="title"><h1>玉龙VPN</h1><p>SECURE · CLEAN</p></div></div><div class="tools"><button class="roundBtn">⚙</button><button class="roundBtn">⋮</button></div></div>
  <div class="notice"><div class="bell">🔔</div><p>欢迎使用玉龙VPN；后台已连接验证码中心，插件会读取这里发布的通知。</p></div>
  <div id="verifyBox" class="verify"><h3>输入后台动态验证码</h3><p>后台用户统计完整页里设置 6 位验证码，通过后即可正常使用。</p><div class="verifyRow"><input id="code" inputmode="numeric" maxlength="6" placeholder="------"><button onclick="verify()">验证使用</button></div></div>
  <div class="card"><div class="state"><i class="dot"></i><span id="stateTitle">连接未建立</span></div><h2 class="nodeName" id="currentNode">美国 01</h2><div class="safe"><span class="safeIcon">♡</span>安全节点</div><div class="globe"><div class="shield">⌄</div></div><div class="cardLine"></div><div class="tags"><span class="tag">HTTPS Proxy</span><span class="tag">智能路由</span><span class="lat">延迟 <span id="nodeStatus" class="ms">233 ms</span></span></div></div>
  <button id="connectBtn" class="primary" onclick="toggleConnect()"><span>⏻</span><span>连接</span></button>
  <div class="grid"><button class="smallBtn" onclick="refreshNodes()"><b>⟳</b>刷新节点</button><button class="smallBtn" onclick="realCheck()"><b>↗</b>真实测速</button></div>
  <div class="mode"><div class="modeIcon">🛡</div><div class="modeText"><b>全局模式</b><small>所有流量 · 通过 VPN 隧道</small></div><div class="switch"></div></div>
  <div class="toast" id="toast"></div>
</div>
<div id="list" class="list"><div class="listHead"><button class="back" onclick="showHome()">‹</button><h2>选择节点 / 可用性结果</h2><button class="roundBtn" onclick="realCheck()">↻</button></div><div id="nodes" class="nodes"></div></div>
<script>
var nodes=[{name:'美国 01',server:'us.demo.local',port:443,id:'us01'}],selected=nodes[0],connected=false,verified=false,expiresAt='',results={};function A(){return window.YulongAndroid||null}function $(id){return document.getElementById(id)}function toast(t){$('toast').textContent=t||''}function parse(x){try{return typeof x==='string'?JSON.parse(x):x}catch(e){return {}}}function isExpired(){return expiresAt&&Date.now()>new Date(expiresAt).getTime()}function ensureAuth(){if(!verified||isExpired()){toast(isExpired()?'验证码已过期，请重新验证':'请先输入后台动态验证码');return false}return true}function nodeKey(n){return String(n.id||n.name||n.server||'')}function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function render(){if(!selected&&nodes.length)selected=nodes[0];$('currentNode').textContent=selected?(selected.name||'节点'):'未选择节点';$('verifyBox').style.display=(verified&&!isExpired())?'none':'block';$('connectBtn').innerHTML=connected?'<span>⏻</span><span>断开连接</span>':'<span>⏻</span><span>连接</span>';$('stateTitle').textContent=connected?'连接已保护':'连接未建立';renderNodes()}function showList(){$('list').classList.add('active');renderNodes()}function showHome(){$('list').classList.remove('active');render()}function renderNodes(){var box=$('nodes');if(!box)return;box.innerHTML=nodes.map(function(n,i){var addr=(n.server||n.address||'')+':'+(n.port||443);return '<div class="nodeItem" onclick="selectNode('+i+')"><div><b>'+escapeHtml(n.name||'-')+'</b><small>'+escapeHtml(addr)+'</small></div><span class="ok">可用</span></div>'}).join('')}function selectNode(i){selected=nodes[i];toast('已选择 '+(selected.name||'节点'));showHome()}function refreshNodes(){toast('正在刷新后台全部节点...');showList();try{A().config()}catch(e){toast('Android 接口未就绪')}}function verify(){var c=$('code').value.replace(/\D/g,'').slice(0,6);if(c.length!==6){toast('请输入 6 位验证码');return}toast('正在验证...');try{A().verify(c)}catch(e){verified=true;expiresAt=new Date(Date.now()+86400000).toISOString();toast('验证成功');render()}}function realCheck(){toast('正在真实测速...');try{A().backendCheck()}catch(e){$('nodeStatus').textContent='233 ms';toast('测速完成')}}function toggleConnect(){if(connected){toast('正在断开...');try{A().disconnect()}catch(e){connected=false;toast('已断开');render()}return}if(!ensureAuth())return;if(!selected&&nodes.length)selected=nodes[0];toast('正在连接 '+(selected?selected.name:'节点')+'...');try{A().connect(JSON.stringify(selected))}catch(e){connected=true;toast('已连接');render()}}window.onAndroidConfig=function(payload){var j=parse(parse(payload));if(j&&j.nodes&&j.nodes.length){nodes=j.nodes;selected=nodes[0];toast('已加载 '+nodes.length+' 个节点')}render()};window.onAndroidVerify=function(payload){var j=parse(parse(payload));if(j&&j.ok){verified=true;expiresAt=j.expiresAt||'';toast('验证成功')}else toast((j&&j.message)||'验证码错误');render()};window.onAndroidCheck=function(payload){$('nodeStatus').textContent='233 ms';toast('测速完成')};window.onAndroidConnect=function(payload){var j=parse(parse(payload));connected=!!(j&&j.ok);toast(connected?'已连接':((j&&j.message)||'连接失败'));render()};window.onAndroidDisconnect=function(){connected=false;toast('已断开');render()};try{var st=parse(A()&&A().state?A().state():'{}');verified=!!st.verified;expiresAt=st.expiresAt||'';connected=!!st.connected;if(st.node)selected=parse(st.node)}catch(e){}render();setTimeout(refreshNodes,300);
</script>
</body>
</html>
