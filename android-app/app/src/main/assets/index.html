<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>FanVPN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}:root{--bg:#0A0E1A;--deep:#050810;--card:#0F1525;--elev:#131B2E;--line:rgba(120,200,255,.13);--line2:rgba(120,200,255,.24);--text:#E8F1FF;--muted:#8FA3BF;--dim:#5A6B85;--neon:#00E5FF;--green:#00FF94;--amber:#FFB547;--red:#FF4757}html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(120,200,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(120,200,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000,transparent);-webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000,transparent)}body:after{content:"";position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:360px;height:260px;background:radial-gradient(ellipse,rgba(0,229,255,.16),transparent 70%);filter:blur(38px);pointer-events:none}.wrap{position:relative;z-index:1;width:100%;max-width:380px;min-height:100vh;margin:0 auto;display:flex;flex-direction:column}.header{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800}.mark{width:27px;height:27px;border-radius:7px;background:linear-gradient(135deg,var(--neon),var(--green));display:grid;place-items:center;color:var(--deep);font-weight:900;box-shadow:0 0 18px rgba(0,229,255,.35)}.pill{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:99px;background:rgba(255,255,255,.03);border:1px solid var(--line2);font-size:12px;color:var(--muted);font-weight:700}.dot{width:7px;height:7px;border-radius:50%;background:var(--dim)}.pill.on{border-color:rgba(0,255,148,.45);color:var(--green);background:rgba(0,255,148,.08)}.pill.on .dot{background:var(--green);box-shadow:0 0 9px var(--green)}.pill.wait{border-color:rgba(255,181,71,.45);color:var(--amber);background:rgba(255,181,71,.08)}.pill.wait .dot{background:var(--amber);box-shadow:0 0 9px var(--amber)}.hero{padding:36px 22px 24px;display:flex;flex-direction:column;align-items:center;gap:20px;flex:1}.shield{position:relative;width:172px;height:172px;display:grid;place-items:center}.r{position:absolute;border-radius:50%;transition:.35s}.r3{width:172px;height:172px;border:1px solid rgba(120,200,255,.12)}.r2{width:134px;height:134px;border:1px solid rgba(120,200,255,.18)}.r1{width:98px;height:98px;border:1px solid rgba(120,200,255,.25);background:rgba(0,229,255,.025)}.on .r3,.on .r2,.on .r1{border-color:rgba(0,255,148,.42)}.wait .r3,.wait .r2{animation:pulse 1.8s infinite;border-color:rgba(255,181,71,.42)}@keyframes pulse{50%{transform:scale(1.08);opacity:.55}}.power{position:relative;z-index:2;width:78px;height:78px;border-radius:50%;border:1px solid var(--line2);background:linear-gradient(160deg,#1A2340,#0F1525);display:grid;place-items:center;box-shadow:0 10px 32px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.06)}.power.on{background:linear-gradient(160deg,var(--neon),var(--green));border-color:transparent;box-shadow:0 8px 34px rgba(0,255,148,.36)}.power.wait{background:linear-gradient(160deg,#2A2210,#1A1505);border-color:rgba(255,181,71,.55);box-shadow:0 8px 34px rgba(255,181,71,.18)}svg path{transition:.3s}.title{text-align:center}.title h1{font-size:21px;line-height:1.2;letter-spacing:-.4px}.title p{margin-top:6px;font-size:13px;color:var(--dim)}.node{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px}.node:active{background:var(--elev)}.left{display:flex;align-items:center;gap:12px;min-width:0}.flag{width:39px;height:39px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.03);display:grid;place-items:center;color:var(--dim);font-size:11px;font-weight:900;letter-spacing:.4px}.flag.active{border-color:rgba(0,229,255,.38);background:rgba(0,229,255,.1);color:var(--neon)}.ntext{min-width:0}.ntext b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ntext small{display:block;margin-top:3px;color:var(--dim);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}.chev{color:var(--muted);font-size:12px;font-weight:800}.notice{display:none;margin:0 22px 12px;border-top:1px solid rgba(0,229,255,.14);border-bottom:1px solid rgba(0,229,255,.1);padding:11px 0;color:var(--muted);font-size:12px;line-height:1.45}.footer{padding:15px 22px 20px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.chip{font-size:11px;font-weight:800;color:var(--dim);padding:6px 14px;border-radius:99px;border:1px solid var(--line);background:rgba(255,255,255,.02)}.chip.active{color:var(--green);border-color:rgba(0,255,148,.38);background:rgba(0,255,148,.07)}.link{font-size:11px;color:var(--dim);text-decoration:none;font-weight:700}.list{display:none;position:relative;z-index:1;max-width:380px;min-height:100vh;margin:0 auto;background:var(--bg)}.listHead{height:60px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.back{border:0;background:none;color:var(--muted);font-size:32px}.listTitle{font-size:16px;font-weight:800}.refresh{border:1px solid rgba(0,229,255,.24);background:rgba(0,229,255,.07);color:var(--neon);border-radius:7px;padding:7px 11px;font-size:12px;font-weight:800}.item{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.status{font-size:11px;margin-top:3px;color:var(--dim);font-weight:700}.ok{width:21px;height:21px;border-radius:50%;background:linear-gradient(135deg,var(--neon),var(--green));display:grid;place-items:center;box-shadow:0 0 12px rgba(0,229,255,.35)}.ok:after{content:"";width:7px;height:7px;border-radius:50%;background:var(--deep)}.off{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--line2)}
</style>
</head>
<body>
<div id="main" class="wrap">
  <div class="header"><div class="brand"><div class="mark">F</div><span>FanVPN</span></div><div id="pill" class="pill"><i class="dot"></i><span id="status">未连接</span></div></div>
  <div class="hero">
    <div id="shield" class="shield"><div class="r r3"></div><div class="r r2"></div><div class="r r1"></div><button id="power" class="power"><svg width="34" height="34" viewBox="0 0 32 32" fill="none"><path id="shieldPath" d="M16 3L4 8v9c0 6.6 5 12.7 12 14 7-1.3 12-7.4 12-14V8L16 3z" stroke="#5A6B85" stroke-width="1.8" stroke-linejoin="round"/><path id="checkPath" d="M11 16l4 4 6-7" stroke="#5A6B85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
    <div class="title"><h1 id="heroTitle">点击连接</h1><p id="heroSub">安全访问全球网络</p></div>
    <div id="node" class="node"><div class="left"><div id="flag" class="flag">AUTO</div><div class="ntext"><b id="nodeName">加载中…</b><small id="nodeSub">自动选择</small></div></div><span class="chev">选择 ›</span></div>
  </div>
  <div id="notice" class="notice">欢迎使用 FanVPN；当前 APK 已恢复原插件视觉风格。</div>
  <div class="footer"><span id="mode" class="chip">智能分流</span><a class="link">官网:fanvpn.net</a></div>
</div>
<div id="list" class="list"><div class="listHead"><button id="back" class="back">‹</button><div class="listTitle">选择节点</div><button id="refresh" class="refresh">↻ 检测</button></div><div id="nodeList"></div></div>
<script>
(function(){
let nodes=[{id:'auto',name:'自动选择',server:'127.0.0.1',port:443,country:'AUTO'},{id:'us01',name:'美国 01',server:'us.demo.local',port:443,country:'US'},{id:'hk01',name:'香港 01',server:'hk.demo.local',port:443,country:'HK'},{id:'sg01',name:'新加坡 01',server:'sg.demo.local',port:443,country:'SG'}],selected=nodes[0],connected=false,waiting=false,global=false;
const $=id=>document.getElementById(id), A=()=>window.YulongAndroid||null, parse=x=>{try{return typeof x==='string'?JSON.parse(x):x}catch(e){return {}}};
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function flag(n){let s=String((n&& (n.country||n.flag||n.name||n.id))||'AUTO').toUpperCase();if(s.includes('香港')||s.includes('HK'))return'HK';if(s.includes('美国')||s.includes('US'))return'US';if(s.includes('日本')||s.includes('JP'))return'JP';if(s.includes('新加坡')||s.includes('SG'))return'SG';return'AUTO'}
function color(c){$('shieldPath').setAttribute('stroke',c);$('checkPath').setAttribute('stroke',c)}
function state(){['shield','power','pill'].forEach(id=>{$(id).classList.remove('on','wait')});if(waiting){$('shield').classList.add('wait');$('power').classList.add('wait');$('pill').classList.add('wait');$('status').textContent='连接中';$('heroTitle').textContent='正在连接';$('heroSub').textContent='正在建立安全通道';color('#FFB547')}else if(connected){$('shield').classList.add('on');$('power').classList.add('on');$('pill').classList.add('on');$('status').textContent='已连接';$('heroTitle').textContent='已安全连接';$('heroSub').textContent=selected.name||'安全节点';color('#061018')}else{$('status').textContent='未连接';$('heroTitle').textContent='点击连接';$('heroSub').textContent='安全访问全球网络';color('#5A6B85')}}
function render(){if(!selected&&nodes.length)selected=nodes[0];$('nodeName').textContent=selected?selected.name:'加载中…';$('nodeSub').textContent=selected&&selected.server?selected.server+':'+(selected.port||443):'自动选择';$('flag').textContent=flag(selected);$('flag').classList.add('active');$('mode').textContent=global?'全局模式':'智能分流';$('mode').classList.toggle('active',global);state();renderList()}
function renderList(){let box=$('nodeList');box.innerHTML=nodes.map((n,i)=>{let act=selected&&String(selected.id||selected.name)==String(n.id||n.name);return '<div class="item" data-i="'+i+'"><div class="left"><div class="flag '+(act?'active':'')+'">'+flag(n)+'</div><div class="ntext"><b>'+esc(n.name)+'</b><div class="status">'+esc(n.server||'自动选择')+':'+(n.port||443)+'</div></div></div><div class="'+(act?'ok':'off')+'"></div></div>'}).join('');box.querySelectorAll('.item').forEach(e=>e.onclick=()=>{selected=nodes[+e.dataset.i];showMain();render()})}
function showList(){$('main').style.display='none';$('list').style.display='block';renderList()}function showMain(){$('list').style.display='none';$('main').style.display='flex'}
function loadState(){try{let a=A();if(a&&a.state){let s=parse(a.state());connected=!!s.connected;if(s.node)try{selected=JSON.parse(s.node)}catch(e){}}}catch(e){}}
function loadConfig(){try{let a=A();if(a&&a.config){a.config();return}}catch(e){}render()}
window.onAndroidConfig=function(p){let j=parse(parse(p));if(j&&Array.isArray(j.nodes)&&j.nodes.length){nodes=j.nodes;if(!selected)selected=nodes[0]}render()};
window.onAndroidConnect=function(p){let j=parse(parse(p));waiting=false;connected=!!(j.ok||j.connected||j.success);if(!connected&&j.message)$('heroSub').textContent=j.message;render()};
window.onAndroidDisconnect=function(){waiting=false;connected=false;render()};window.onAndroidCheck=function(){renderList()};
function toggle(){let a=A();if(connected){waiting=true;render();try{a&&a.disconnect?a.disconnect():(connected=false,waiting=false,render())}catch(e){connected=false;waiting=false;render()}return}waiting=true;render();try{a&&a.connect?a.connect(JSON.stringify(selected||nodes[0])):setTimeout(()=>{connected=true;waiting=false;render()},500)}catch(e){waiting=false;render()}}
$('power').onclick=toggle;$('node').onclick=showList;$('back').onclick=showMain;$('refresh').onclick=loadConfig;$('mode').onclick=()=>{global=!global;render()};loadState();render();loadConfig();
})();
</script>
</body>
</html>
