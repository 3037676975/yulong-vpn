<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>玉龙VPN</title>
<style>
:root{--bg:#06080b;--panel:#111821;--line:rgba(232,196,112,.23);--line2:rgba(120,145,170,.22);--gold:#f2cf75;--gold2:#ba812d;--text:#f8f3e8;--muted:#a7b0bc;--green:#28f59a;--red:#ff7d65}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{font-size:16px;-webkit-text-size-adjust:100%}body{margin:0;min-height:100dvh;background:linear-gradient(180deg,#17202b 0%,#080c12 52%,#06080b 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;overflow-x:hidden}.app{width:100%;max-width:430px;margin:0 auto;min-height:100dvh;padding:16px 18px 22px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:11px}.logo{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 32% 24%,#fff7c5,#d69d38 48%,#2c1e08 78%);color:#171006;font-size:26px;font-weight:900;box-shadow:0 0 26px rgba(214,157,56,.35)}.title h1{font-size:26px;line-height:1;margin:0;font-weight:900;letter-spacing:.5px}.sub{margin-top:5px;color:#b9c0cc;font-size:12px;letter-spacing:3px}.iconbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:#fff;font-size:18px;display:grid;place-items:center}.headBtns{display:flex;gap:8px}.notice{display:flex;gap:10px;align-items:center;border:1px solid var(--line2);background:linear-gradient(180deg,rgba(22,31,42,.92),rgba(13,18,26,.92));border-radius:15px;padding:12px 14px;margin-bottom:10px}.notice p{margin:0;font-size:12px;line-height:1.5;color:#dce4ef}.verify{border:1px solid rgba(242,207,117,.45);border-radius:15px;padding:12px 14px;margin-bottom:12px;background:rgba(24,21,15,.55)}.verify h3{margin:0 0 4px;font-size:13px;color:var(--gold)}.verify p{margin:0 0 9px;color:#c9c0a8;font-size:11px;line-height:1.45}.verifyRow{display:flex;gap:8px;width:100%}.verifyRow input{min-width:0;flex:1;height:40px;border:1px solid rgba(232,196,112,.25);border-radius:11px;background:rgba(255,255,255,.06);color:#fff;text-align:center;letter-spacing:6px;padding-left:6px;font-size:15px;outline:none}.verifyRow button{width:128px;flex:0 0 128px;height:40px;border:0;border-radius:11px;background:linear-gradient(135deg,#ffe495,#d59a31);color:#1a1105;font-weight:900}.card{border:1px solid rgba(111,137,164,.34);border-radius:22px;background:radial-gradient(circle at 78% 20%,rgba(61,47,13,.55),rgba(15,23,33,.96) 38%,rgba(10,15,23,.98));padding:18px;margin-bottom:13px;box-shadow:0 20px 55px rgba(0,0,0,.3)}.cardTop{display:flex;align-items:center;justify-content:space-between}.state{display:flex;align-items:center;gap:8px;color:#dfe9f2;font-size:14px}.dot{width:8px;height:8px;border-radius:50%;background:#697481}.dot.on{background:var(--green);box-shadow:0 0 14px var(--green)}.dot.off{background:#77818c}.nodeMain{display:grid;grid-template-columns:1fr 118px;gap:8px;align-items:center;margin-top:14px}.nodeName{font-size:30px;font-weight:900;line-height:1.1;margin:0 0 8px}.safe{display:flex;align-items:center;gap:6px;color:#b8c1cd;font-size:13px}.shield{height:112px;border-radius:20px;display:grid;place-items:center;background:radial-gradient(circle,#2c2208 0,#171f2a 42%,transparent 72%);color:var(--gold);font-size:52px;text-shadow:0 0 18px rgba(242,207,117,.6)}.divider{height:1px;background:rgba(190,202,220,.16);margin:14px 0 10px}.tags{display:flex;align-items:center;justify-content:space-between;gap:8px}.tag{border:1px solid rgba(232,196,112,.28);border-radius:999px;color:var(--gold);font-size:11px;padding:6px 9px;font-weight:800}.latency{margin-left:auto;color:var(--green);font-size:20px;font-weight:900}.primary{width:100%;height:52px;border:0;border-radius:16px;background:linear-gradient(180deg,#ffe89e,#d59d36);color:#171006;font-size:18px;font-weight:900;box-shadow:0 14px 32px rgba(213,157,56,.22);margin-bottom:10px}.primary.red{background:linear-gradient(180deg,#ff8977,#a72e24);color:#fff}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.btn{height:50px;border:1px solid rgba(111,137,164,.32);border-radius:15px;background:linear-gradient(180deg,#151e2a,#0e151f);color:#f6ead3;font-weight:900;font-size:13px}.mode{display:flex;align-items:center;gap:12px;border:1px solid rgba(111,137,164,.28);border-radius:16px;background:#111923;padding:12px 14px}.mode b{display:block;font-size:16px}.mode small{display:block;color:#a7b0bc;margin-top:3px}.switch{margin-left:auto;width:48px;height:27px;border-radius:999px;background:linear-gradient(135deg,#f2cf75,#ba812d);position:relative}.switch:after{content:"";position:absolute;right:4px;top:4px;width:19px;height:19px;border-radius:50%;background:#fff}.toast{min-height:22px;margin-top:10px;color:#d9c995;font-size:13px;line-height:1.5;text-align:center}.screenList{display:none;border:1px solid rgba(111,137,164,.34);border-radius:22px;background:#0e151f;height:calc(100dvh - 108px);padding:12px;overflow:hidden}.screenList.active{display:flex;flex-direction:column}.home.hidden{display:none}.listHead{display:flex;align-items:center;gap:8px;margin-bottom:12px}.back{width:40px;height:40px;border:0;background:transparent;color:white;font-size:28px}.listHead h2{font-size:19px;margin:0;flex:1;text-align:center}.search{display:flex;align-items:center;border:1px solid rgba(111,137,164,.26);border-radius:14px;background:#0b1119;height:40px;padding:0 12px;margin-bottom:10px;color:#8f9ba8;font-size:13px}.nodes{overflow-y:auto;min-height:0;flex:1;padding-right:2px}.nodeItem{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid rgba(111,137,164,.22);border-radius:14px;background:#111a24;padding:10px;margin-bottom:8px}.nodeItem.active{border-color:rgba(242,207,117,.75);box-shadow:inset 0 0 0 1px rgba(242,207,117,.28)}.nodeLeft{display:flex;align-items:center;gap:10px;min-width:0}.round{width:36px;height:36px;border-radius:50%;border:1px solid rgba(232,196,112,.45);display:grid;place-items:center;color:var(--gold);flex:0 0 auto}.nodeText{min-width:0}.nodeText b{font-size:15px}.nodeText small{display:block;margin-top:2px;color:#8f9ba8;font-size:10px;max-width:128px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.protocol{border:1px solid rgba(232,196,112,.35);border-radius:999px;padding:4px 8px;color:var(--gold);font-size:10px;font-weight:900}.result{width:52px;text-align:right;font-weight:900;font-size:13px;color:#d9c995}.result.ok{color:var(--green)}.result.bad{color:var(--red)}.foot{border-top:1px solid rgba(111,137,164,.2);padding-top:8px;color:#a7b0bc;font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand"><div class="logo">龙</div><div class="title"><h1>玉龙VPN</h1><div class="sub">SECURE · CLEAN</div></div></div><div class="headBtns"><button class="iconbtn">⚙</button><button class="iconbtn">⋮</button></div></div>
  <section id="home" class="home">
    <div class="notice"><div>🔔</div><p>欢迎使用玉龙VPN；后台已连接验证码中心，插件会读取这里发布的通知。</p></div>
    <div id="verifyBox" class="verify"><h3>输入后台动态验证码</h3><p>后台用户统计完整页里设置 6 位验证码，通过后即可正常使用。</p><div class="verifyRow"><input id="code" inputmode="numeric" maxlength="6" placeholder="------"><button onclick="verify()">验证使用</button></div></div>
    <div class="card"><div class="cardTop"><div class="state"><span id="stateDot" class="dot off"></span><b id="stateTitle">连接未建立</b></div></div><div class="nodeMain"><div><h2 class="nodeName" id="currentNode">美国 01</h2><div class="safe">🛡 安全节点</div></div><div class="shield">🛡</div></div><div class="divider"></div><div class="tags"><span class="tag">HTTPS Proxy</span><span class="tag">智能路由</span><span class="latency" id="nodeStatus">未检测</span></div></div>
    <button id="connectBtn" class="primary" onclick="toggleConnect()">⏻ 连接</button>
    <div class="grid2"><button class="btn" onclick="refreshNodes()">⟳<br>刷新节点</button><button class="btn" onclick="realCheck()">↗<br>真实测速</button></div>
    <div class="mode"><div class="round">🛡</div><div><b>全局模式</b><small>所有流量 · 通过 VPN 隧道</small></div><div class="switch"></div></div>
  </section>
  <section id="list" class="screenList"><div class="listHead"><button class="back" onclick="showHome()">‹</button><h2>选择节点 / 可用性结果</h2><button class="iconbtn" onclick="realCheck()">↻</button></div><div class="search">🔍　搜索国家或节点　　　　　　　　　筛选</div><div id="nodes" class="nodes"></div><div class="foot" id="listHint">已显示后台加载节点、地址和可用性结果，可滚轮上下选择</div></section>
  <div class="toast" id="toast">正在等待 Cordova...</div>
</div>
<script src="cordova.js"></script>
<script>
var nodes=[],selected=null,connected=false,verified=false,expiresAt='',results={};
function $(id){return document.getElementById(id)}
function toast(t){$('toast').textContent=t||''}
function api(method,path,body){return window.YulongVPN.api(method,path,body||{})}
function isExpired(){return expiresAt && Date.now()>new Date(expiresAt).getTime()}
function ensureAuth(){if(!verified||isExpired()){toast(isExpired()?'验证码已过期，请重新验证':'请先输入后台动态验证码');return false}return true}
function nodeKey(n){return String(n.id||n.name||n.server||'')}
function resultFor(n){return results[nodeKey(n)]||results[n.name]||results[n.server]||null}
function labelText(n){var r=resultFor(n);if(!r)return {t:'未检测',c:''};if(r.ok===null)return {t:'检测中',c:''};return r.ok?{t:'可用',c:'ok'}:{t:'不可用',c:'bad'}}
function render(){if(!selected&&nodes.length)selected=nodes[0];$('currentNode').textContent=selected?(selected.name||'节点'):'未选择节点';$('verifyBox').style.display=(verified&&!isExpired())?'none':'block';$('connectBtn').textContent=connected?'⏻ 断开连接':'⏻ 连接';$('connectBtn').className=connected?'primary red':'primary';$('stateTitle').textContent=connected?'连接已保护':'连接未建立';$('stateDot').className=connected?'dot on':'dot off';var l=selected?labelText(selected):{t:'未检测',c:''};$('nodeStatus').textContent=l.t;$('nodeStatus').style.color=l.c==='ok'?'#28f59a':(l.c==='bad'?'#ff7d65':'#d9c995');renderNodes()}
function showList(){$('home').classList.add('hidden');$('list').classList.add('active');renderNodes()}
function showHome(){$('home').classList.remove('hidden');$('list').classList.remove('active');render()}
function renderNodes(){var box=$('nodes');if(!box)return;box.innerHTML=nodes.map(function(n,i){var l=labelText(n);var addr=(n.server||n.address||'')+':'+(n.port||443);return '<div class="nodeItem '+(selected&&nodeKey(selected)===nodeKey(n)?'active':'')+'" onclick="selectNode('+i+')"><div class="nodeLeft"><div class="round">🛡</div><div class="nodeText"><b>'+escapeHtml(n.name||'-')+'</b><small>'+escapeHtml(addr)+'</small></div></div><span class="protocol">HTTPS</span><span class="result '+l.c+'">'+l.t+'</span></div>'}).join('')||'<div class="foot">暂无节点，请点击刷新节点</div>'}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function selectNode(i){selected=nodes[i];toast('已选择 '+(selected.name||'节点'));showHome()}
function refreshNodes(){toast('正在刷新后台全部节点...');showList();api('GET','/api/config',{}).then(function(j){nodes=j.nodes||[];if(!selected&&nodes.length)selected=nodes[0];toast('已加载 '+nodes.length+' 个节点');render()}).catch(function(e){toast((e&&e.message)||'配置加载失败')})}
function verify(){var c=$('code').value.replace(/\D/g,'').slice(0,6);$('code').value=c;if(!/^\d{6}$/.test(c)){toast('请输入 6 位动态验证码');return}toast('正在验证，请稍等...');api('POST','/api/access-code',{code:c,clientId:clientId(),pluginVersion:'cordova-1.0.0'}).then(function(j){if(j.ok){verified=true;expiresAt=j.expiresAt||'';localStorage.setItem('verified','1');localStorage.setItem('expiresAt',expiresAt);toast('验证码已通过，可以正常连接');record('verify_success','')}else{verified=false;toast(j.message||'验证码错误或已过期')}render()}).catch(function(e){toast((e&&e.message)||'验证失败，手机访问不到后台接口')})}
function toggleConnect(){connected?disconnect():connect()}
function connect(){if(!ensureAuth())return;if(!selected){toast('请先选择节点');showList();return}toast('正在连接 '+(selected.name||'节点')+'...');window.YulongVPN.startVpn(selected).then(function(){connected=true;localStorage.setItem('connected','1');localStorage.setItem('node',JSON.stringify(selected));toast('已连接 '+(selected.name||''));record('connect',selected.name||'');render()}).catch(function(e){toast((e&&e.message)||'连接失败')})}
function disconnect(){toast('正在断开...');window.YulongVPN.stopVpn().then(function(){connected=false;localStorage.removeItem('connected');toast('已断开');record('disconnect',selected&&selected.name?selected.name:'');render()}).catch(function(e){toast((e&&e.message)||'断开失败')})}
function realCheck(){if(!ensureAuth())return;showList();toast('正在调用后台一键检测结果...');$('listHint').textContent='检测中，请稍等...';results={};nodes.forEach(function(n){results[nodeKey(n)]={ok:null}});renderNodes();api('POST','/api/plugin-node-test-all',{}).then(function(j){results={};(j.results||[]).forEach(function(r){results[r.id]=r;results[r.name]=r;results[r.host]=r});$('listHint').textContent='已同步后台检测结果：可用 '+(j.okCount||0)+' / 不可用 '+(j.failCount||0);toast('检测完成');renderNodes();render()}).catch(function(e){toast((e&&e.message)||'后台检测失败')})}
function clientId(){var id=localStorage.getItem('clientId');if(!id){id='cordova-'+Date.now()+'-'+Math.round(Math.random()*100000);localStorage.setItem('clientId',id)}return id}
function record(event,nodeName){api('POST','/api/client-stats',{clientId:clientId(),event:event,pluginVersion:'cordova-1.0.0',nodeName:nodeName||''}).catch(function(){})}
function boot(){verified=localStorage.getItem('verified')==='1';expiresAt=localStorage.getItem('expiresAt')||'';connected=localStorage.getItem('connected')==='1';try{var n=localStorage.getItem('node');if(n)selected=JSON.parse(n)}catch(e){}toast('正在加载配置...');refreshNodes();record('open','');render()}
document.addEventListener('deviceready',boot,false);
setTimeout(function(){if(!window.YulongVPN)toast('Cordova 原生插件未加载，请确认安装的是 Cordova 版 APK')},3000);
render();
</script>
</body>
</html>
