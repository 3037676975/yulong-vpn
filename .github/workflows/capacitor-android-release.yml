name: Android APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: gradle -p android-app :app:assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk dist/yulong-vpn-android-debug.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yulong-vpn-android-debug-apk
          path: dist/yulong-vpn-android-debug.apk

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="apk-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          gh release create "$tag" dist/yulong-vpn-android-debug.apk --target "$GITHUB_SHA" --title "Yulong VPN APK $tag" --notes "自动构建的 Android APK"